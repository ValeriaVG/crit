codecov:
  notify:
    after_n_builds: 2
    wait_for_ci: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

ignore:
  - "frontend/"
  - "e2e/"
  - "node_modules/"
  - "integrations/"
  - "gen_integration_hashes.go"
  - "integration_hashes_gen.go"
